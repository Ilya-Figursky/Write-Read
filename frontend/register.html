<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title>W&R_register</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <section id="register-container">

            <div class="registerInputs-group">
                <input id="registerLoginInput" type="text" placeholder="Login"></input>
                <input id="registerLoPasswordInput" type="password" placeholder="Password"></input>
            </div>

            <div class="registerButtons-group">
                <button id="signUpButton">Sign Up</button>
                <button id="logInButton">Sign in</button>
            </div>

        </section>

        <script src="register.js"></script>
    </body>
</html>
